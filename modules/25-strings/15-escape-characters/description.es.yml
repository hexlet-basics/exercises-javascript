---

name: Secuencias de escape
theory: |

  Supongamos que queremos mostrar el texto de abajo en dos líneas.

  ```text
  - Are you hungry?
  - Aaaarrrgh!
  ```

  Si simplemente pasamos este texto a `console.log()`, JavaScript imprimirá todo en una sola línea. Técnicamente, podríamos escribir dos llamadas consecutivas a `console.log()`, pero imaginemos que queremos hacerlo con una sola.

  ```javascript
  console.log('- Are you hungry?- Aaaarrrgh!');
  // => - Are you hungry?- Aaaarrrgh!
  ```

  Para que cada una de ellas empiece en una nueva línea, necesitamos agregar un salto de línea, es decir, "presionar Enter". En programación, esto se hace agregando caracteres especiales, en este caso `\n`. Sí, no es un error de escritura. A pesar de que aquí vemos dos caracteres, desde el punto de vista de JavaScript es un solo carácter.

  ```javascript
  console.log('- Are you hungry?\n- Aaaarrrgh!');
  ```

  El resultado será el siguiente.

  ```text
  - Are you hungry?
  - Aaaarrrgh!
  ```

  ## ¿Qué es `\n`?

  `\n` es una secuencia de escape (en inglés, escape sequence; a veces se le llama "secuencia escapada"). Denota un salto de línea, pero no se muestra directamente. No verás `\n` en la salida del programa, ya que solo afecta a la disposición del texto.

  En los editores de texto, al presionar Enter se agrega un carácter invisible LF (Line Feed). Eso es precisamente lo que significa `\n`. A veces estos caracteres se pueden ver si activas la visualización de los caracteres especiales.

  ```text
  - ¡Hola!¶
  - ¡Oh, hola!¶
  - ¿Cómo estás?
  ```

  Las impresoras, los editores y los intérpretes de JavaScript entienden `\n` como una orden de empezar el texto en una nueva línea.

  ## Ejemplos de uso de `\n`

  Así es como JavaScript procesa la secuencia de escape `\n`.

  ```text
  En el código   'Hello\nWorld'
                       ↓
  En pantalla    Hello
                 World
  ```

  La posición de `\n` cambia la salida final.

  ```javascript
  console.log('Hello\nWorld');
  // Hello
  // World

  console.log('Hello \nWorld');
  // Hello
  // World  (al final de la primera línea hay un espacio)

  console.log('Hello\n World');
  // Hello
  //  World  (al principio de la segunda línea hay un espacio)

  console.log('Hello\n\nWorld');
  // Hello
  //
  // World  (una línea vacía entre ellas)
  ```

  Los espacios antes o después de `\n` también se tienen en cuenta. JavaScript los interpreta como caracteres ordinarios y los muestra en la salida.

  También puedes insertar `\n` en cualquier parte de la cadena, antes, después, o incluso usarlo por sí solo.

  ```javascript
  console.log('First line');
  console.log('\n');          // simplemente una línea vacía
  console.log('Second line');
  ```

  El resultado será el siguiente.

  ```text
  First line

  Second line
  ```

  ## Cómo mostrar el propio carácter `\n`

  `\n` en JavaScript es una secuencia de escape. Controla la disposición del texto y no se muestra en pantalla como los caracteres ordinarios. Si necesitas mostrar precisamente los caracteres `\` y `n`, en lugar de un salto de línea, hay que escaparlos. Para ello, se agrega otra barra antes de la barra invertida.

  ```javascript
  console.log('Hello\\nWorld');
  // Hello\nWorld

  // Si te olvidas de indicar la segunda barra
  console.log('Hello\nWorld');
  // Hello
  // World
  ```

  En este caso, JavaScript entiende `\\` como una barra invertida ordinaria y muestra la cadena sin salto de línea.

  ## Otras secuencias de escape

  Además de `\n`, en JavaScript existen otras secuencias de escape.

  - `\t` denota una tabulación (el equivalente de la tecla Tab).
  - `\r` denota un retorno de carro (se usa en Windows, pero rara vez se aplica en el código moderno).
  - En programación, lo que más se usa es precisamente `\n`; es suficiente para la mayoría de las tareas.

  ## Detalles importantes

  - `\n` es un solo carácter, a pesar de que en el código se escribe como dos (`\` y `n`).
  - En Windows, por defecto se utiliza la combinación `\r\n`, pero en JavaScript (y en el desarrollo multiplataforma en general) se acostumbra a usar solo `\n` para evitar problemas al transferir el código entre sistemas.

instructions: |

  Estás escribiendo un programa que muestra al usuario una pista sobre cómo dividir el texto en líneas. Muestra la pista con una sola llamada a `console.log()`:

  ```text
  Use "\n" to separate lines
  Example: console.log("line1\nline2")
  ```

  Ten en cuenta: `\n` en la primera línea es texto literal, no un salto de línea.

