---

name: Codificación
theory: |

  En el nivel más básico, una computadora trabaja únicamente con ceros y unos, lo que constituye el llamado código binario. Cada uno o cero se denomina bit (de binary digit, "dígito binario").

  Cualquier dato en una computadora se representa simplemente como una secuencia de bits, por ejemplo imágenes, música y texto. Los números habituales del sistema decimal también pueden representarse en forma binaria.

  - 0 → `0`
  - 1 → `1`
  - 2 → `10`

  ## ¿Cómo codificar texto?

  Una computadora no "entiende" el texto. Para trabajar con letras y otros caracteres, también hay que convertirlos en números. Esto se hace mediante codificaciones, es decir, tablas en las que a cada carácter le corresponde un número determinado.

  La forma más sencilla consiste en numerar las letras, empezando por 1.

  - `a` → `1`
  - `b` → `2`
  - ...y así hasta `z` → `26`

  Ahora podemos representar la palabra `hello` como un conjunto de números.

  ```text
  h e l l o
  ↓ ↓ ↓ ↓ ↓
  8 5 12 12 15
  ```

  Y `good` se convierte en la siguiente secuencia.

  ```text
  g o o d
  ↓ ↓ ↓ ↓
  7 15 15 4
  ```

  El programa no sabe que esto es una palabra. Simplemente ve la instrucción "hay que mostrar el carácter con el código 8, luego el de código 5, etc.".

  ## ASCII. La primera codificación masiva

  Las primeras computadoras trabajaban principalmente con el idioma inglés. Para él, en la década de 1960 se inventó la tabla ASCII, que incluía 128 caracteres, entre ellos el alfabeto latino, los dígitos, los signos de puntuación, los caracteres especiales (`@`, `#`, `!`, `\n`) y los códigos de control.

  Esto bastaba para los primeros programas, pero no para todo el mundo.

  Cuando las computadoras empezaron a usarse en otros países, surgió un problema. En ASCII no hay cirílico, ideogramas, escritura árabe, acentos, símbolos de moneda, etc.

  Cada país o empresa empezó a crear su propia codificación basada en ASCII.

  - Windows ideó Windows-1251 para el ruso
  - Apple creó Mac Roman
  - Los países de Europa del Este, Asia y Oriente Medio desarrollaron sus propias variantes

  Todas estas codificaciones eran incompatibles entre sí. El código 226 en una codificación podía ser la letra é, en otra una letra distinta, y en una tercera incluso un carácter técnico. Esto provocaba un verdadero caos.

  ## Cómo se veían los problemas con las codificaciones

  Si ves esto en un texto.

  ```text
  ÐÑÐ¸Ð²ÐµÑ!
  ```

  Significa que el programa determinó incorrectamente la codificación del texto. Recibió una secuencia de bytes, pero los leyó con la tabla equivocada.

  Esto era lo habitual en las décadas de 1990 y 2000. Un programa escribía el texto en Windows-1251, otro lo leía como ISO-8859-1 y, como resultado, salía basura.

  ## Unicode y UTF-8. El fin del desorden

  Para arreglarlo todo, en la década de 1990 se empezó a crear la tabla universal Unicode, que contiene los caracteres de todos los sistemas de escritura del mundo, entre ellos el alfabeto latino y el cirílico, la escritura china y árabe, los signos matemáticos, la escritura del antiguo Egipto e incluso los emojis.

  Dentro de Unicode hay varios formatos de almacenamiento. El más extendido de ellos es UTF-8. Codifica de forma compacta los caracteres ingleses, pero puede ampliarse para cualquier otro.

  Hoy en día, UTF-8 es el estándar por defecto en internet, JavaScript, Linux, las bases de datos y los editores de código.

  ## ¿Por qué debe saber esto un programador?

  - Vas a trabajar con texto, y los errores de codificación siguen ocurriendo, especialmente al leer archivos, procesar datos, interactuar con APIs y bases de datos.
  - JavaScript usa Unicode para las cadenas por defecto.
  - Hay que saber diagnosticar los problemas. Por ejemplo, si ves "caracteres ilegibles", casi con seguridad es un error de codificación.

instructions: |

  El programa recibe los códigos numéricos de los caracteres y los muestra en pantalla: esto es útil cuando un carácter es difícil de escribir con el teclado. Encuentra los caracteres con los códigos 126, 94 y 37 en la tabla ASCII y muestra cada uno en una línea distinta con la función `String.fromCharCode()`.

  ```javascript
  console.log(String.fromCharCode(...));
  console.log(String.fromCharCode(...));
  console.log(String.fromCharCode(...));
  ```

  Por ejemplo, el carácter `?` tiene el código 63:

  ```javascript
  console.log(String.fromCharCode(63)); // salida: ?
  ```

