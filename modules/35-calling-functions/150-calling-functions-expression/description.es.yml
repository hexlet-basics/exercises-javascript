---

name: Llamada a una función es una expresión
theory: |

  Cuando escribimos programas, necesitamos conectar acciones entre sí. La suma de números, la unión de cadenas y el trabajo con variables son ejemplos de cómo pasos simples se combinan en un comportamiento más complejo.

  ```javascript
  const rate = 10;
  const hours = 5;
  const salary = rate * hours + 100;
  console.log(salary); // => 150
  ```

  En programación, para esto se usa el concepto de **expresión**: una construcción que se evalúa y produce un resultado. En el ejemplo anterior, `rate * hours + 100` es una expresión compuesta por variables, un literal numérico y operaciones aritméticas. El resultado se puede guardar en una variable o usar más adelante.

  Las expresiones se pueden combinar infinitamente, complicando gradualmente la lógica. Cada nueva expresión se convierte en parte de una mayor:

  ```javascript
  const bonus = 50;
  const salary = (rate * hours + bonus) * 12 - 500;
  console.log(salary);
  ```

  Así es exactamente como se construyen los programas: los pasos pequeños se suman en grandes construcciones. Por eso es imposible memorizar de antemano todas las combinaciones; es mucho más importante entender cómo se conectan las expresiones entre sí.

  ## Expresiones como argumentos de funciones

  Un argumento de una función siempre es algún valor. Pero un valor no solo se puede escribir directamente, también se puede calcular. Y esto significa que en los argumentos de una función se pueden sustituir cualesquiera expresiones:

  ```javascript
  // Aquí el argumento es el número 150
  console.log(150);

  // Y aquí el argumento es una expresión que primero se evalúa
  console.log(10 * 15); // => 150

  // Se puede combinar de forma más compleja
  const rate = 10;
  const hours = 15;
  const bonus = 50;
  console.log(rate * hours + bonus); // => 200
  ```

  La función `console.log()` simplemente recibe un valor ya listo y lo muestra en pantalla. La forma de obtener ese valor le es indiferente a la función; por eso las llamadas a funciones combinan perfectamente con cualquier expresión.

  ## Llamada a una función dentro de una función

  Como una llamada a una función es en sí misma una expresión, su resultado se puede pasar de inmediato a otra función:

  ```javascript
  // Math.abs(-5) devuelve 5
  // Este resultado se usa de inmediato como argumento de console.log()
  console.log(Math.abs(-5)); // => 5
  ```

  Aquí `Math.abs(-5)` se evalúa primero y devuelve `5`. Luego este valor se sustituye en la llamada a `console.log()`. Tal combinación puede ser tan profunda como se quiera:

  ```text
  console.log(Math.abs(-5))

  Paso 1:  Math.abs(-5)  →  5
  Paso 2:  console.log(5) →  muestra 5
  ```

  Primero se evalúan las llamadas anidadas, luego la externa. Por ejemplo, en `Math.round(Math.random() * 10)` primero se ejecuta `Math.random()`, luego la multiplicación y solo después `Math.round()`.

  ## Uso de funciones como parte de expresiones

  Las funciones devuelven valores, lo que significa que sus llamadas se pueden usar como parte de cualquier otra expresión. Para obtener la longitud de una cadena, usaremos la función `length()`:

  ```javascript
  import { length } from 'hexlet-basics/string';

  const name = 'python';

  // La longitud de la cadena menos 1: el índice del último carácter
  const lastIndex = length(name) - 1;
  console.log(lastIndex); // => 5

  // El resultado se puede usar en aritmética
  const text = 'hexlet';
  const double = length(text) * 2;
  console.log(double); // => 12
  ```

  Aquí `length(name)` y `length(text)` son expresiones completas: devuelven valores que se pueden combinar con números, variables y otras operaciones.

instructions: |

  Dada la cadena `text = 'Hexlet'`. Muestra en pantalla el primer y el último carácter en el formato:

  ```text
  First: H
  Last: t
  ```

definitions:
  - name: Expresión
    description: |
      una secuencia de acciones sobre datos que conduce a algún resultado que se puede utilizar.
