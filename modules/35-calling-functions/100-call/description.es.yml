---

name: Funciones y su llamada
theory: |

  La programación existe para realizar las operaciones más diversas. A veces son acciones sencillas, como sumar números o concatenar cadenas. Pero más a menudo se trata de procesos complejos, como transferir dinero entre cuentas, hacer un pedido en una tienda en línea, calcular impuestos o preparar un informe.

  Tales operaciones no se pueden expresar con un solo comando. Detrás de una acción como "transferir dinero" pueden esconderse decenas, cientos e incluso miles de líneas de código: comprobar el saldo, descontar la cantidad, tener en cuenta la comisión, actualizar la base de datos, enviar una notificación.

  Para gestionar este código y no perderse en los detalles, se utilizan las funciones. Una función agrupa un bloque de código en un todo único, oculta la implementación y permite concentrarse en el significado. Al programador le basta con llamar a la función y confiarle todo el trabajo interno.

  Imaginemos una función que transfiere dinero de una cuenta a otra. En su interior puede haber cientos de líneas de código, pero nosotros no las vemos. Desde fuera, todo parece un único comando sencillo:

  ```javascript
  transferMoney('Alice', 'Bob', 100);
  ```

  Esta línea llama a la función `transferMoney()`. Se le pasan el remitente `Alice`, el destinatario `Bob` y la cantidad `100`.

  Aquí tienes algunos ejemplos más de llamadas a funciones. Cada una tiene su propio nombre y su propio conjunto de datos con los que trabajar:

  ```javascript
  // Sí, sí, console.log también es una función
  console.log('Hexlet!');

  // Envío de un correo a un usuario
  sendEmail('bob@example.com', 'Welcome!');

  // Cálculo del impuesto sobre la cantidad indicada
  calculateTax(5000, 'Florida');

  // Comprobación de si un usuario está en el sistema
  isRegistered('Alice');

  // Obtención de un número aleatorio del 1 al 10
  randomNumber(1, 10);

  // Creación de una copia de seguridad de la base de datos
  backupDatabase();
  ```

  En una llamada a una función primero se escribe su **nombre** y luego los **paréntesis**. Los paréntesis indican que se trata precisamente de una llamada: así entendemos que tenemos delante una función y no una variable.

  Dentro de los paréntesis se indican los **argumentos**, es decir, los datos que la función recibe para trabajar. Puede haber varios, uno o ninguno.

  ## ¿De dónde salen las funciones?

  Algunas funciones están incorporadas en el lenguaje (built-in), otras las crean los propios programadores.

  Las **funciones incorporadas** vienen junto con JavaScript y se pueden usar de inmediato. Un ejemplo es `console.log()`. Como suele decirse, está disponible de forma global.

  Las **funciones definidas por los programadores** se crean cuando hace falta encapsular la propia lógica en un bloque separado. A esa función se le puede dar cualquier nombre y usarla como una incorporada. Aprenderemos a hacerlo más adelante.

  Además, existen funciones de bibliotecas separadas. Para usarlas, se conectan mediante el mecanismo de importación. Por ahora no analizaremos la importación en detalle: basta con saber que permite conectar un conjunto externo de funciones.

  ## Una función con un parámetro

  Tomemos la función `length()`, que devuelve la cantidad de caracteres de una cadena. Se conecta desde el conjunto estándar de funciones del curso mediante la importación:

  ```javascript
  import { length } from 'hexlet-basics/string';

  const message = 'Hello!';
  const count = length(message);
  console.log(count); // => 6
  ```

  La cadena `'Hello!'` tiene seis caracteres, por lo que la llamada `length(message)` devolverá el número `6`.

  ```text
  Argumento          Función         Resultado
  ┌──────────┐     ┌──────────┐     ┌──────────┐
  │ 'Hello!' │ ──→ │ length() │ ──→ │    6     │
  └──────────┘     └──────────┘     └──────────┘
  ```

  ## Devolución de un valor

  La devolución de un valor es uno de los principios clave del funcionamiento de las funciones. Si una función devuelve un valor, este se puede guardar en una variable, pasar a otra función o usar en cálculos:

  ```javascript
  import { length } from 'hexlet-basics/string';

  const length1 = length('Hello!'); // guardamos el resultado
  const length2 = length('World!');

  const combinedLength = length1 + length2; // usamos el resultado en una expresión
  console.log(combinedLength); // => 12
  ```

  Si la función imprimiera el resultado en pantalla de inmediato (como `console.log()`), veríamos el número, pero no podríamos usarlo después: sumarlo, guardarlo o compararlo. Precisamente por eso la devolución de un valor es tan importante: permite conectar las funciones entre sí. Así, a partir de pequeños pasos se construyen grandes programas.

  ## Una función con varios parámetros

  Algunas funciones aceptan varios valores a la vez. Por ejemplo, `Math.pow()` eleva un número a una potencia: el primer argumento es la base, el segundo es el exponente.

  ```javascript
  // 2 a la 3ª potencia: 2 * 2 * 2
  console.log(Math.pow(2, 3)); // => 8

  // 5 a la 2ª potencia: 5 * 5
  console.log(Math.pow(5, 2)); // => 25
  ```

  En cuanto a la estructura, una llamada con varios argumentos no se diferencia de una llamada con uno: el mismo nombre de función, los paréntesis y los argumentos separados por comas.

  `Math` es un conjunto de funciones incorporado en JavaScript para trabajar con números. Está disponible desde cualquier lugar del programa. Por ahora, la expresión `Math.pow(...)` se puede leer como un "nombre largo de función": el prefijo `Math.` indica que la función pertenece a ese conjunto. Lo que significa realmente el punto lo veremos en las lecciones sobre objetos. Esto no afecta en absoluto al comportamiento de la función.

  La lista completa de funciones matemáticas está disponible en la [documentación de MDN](https://developer.mozilla.org/es/docs/Web/JavaScript/Reference/Global_Objects/Math).

  ## Parámetros y argumentos

  En las conversaciones sobre funciones aparecen las palabras **parámetros** y **argumentos**. Están relacionadas, pero no son lo mismo.

  Se habla de **parámetros** al crear una función: son las variables dentro de la función en las que entran los valores pasados. Se habla de **argumentos** al llamarla: es lo que pasamos a la función. Un argumento puede ser un número, una variable o cualquier expresión:

  ```javascript
  console.log(Math.pow(2, 3)); // => 8, los argumentos son números

  const x = 2;
  // un argumento puede ser una expresión, se evaluará antes de pasarse
  console.log(Math.pow(x + 1, 3)); // => 27
  ```

  No es obligatorio memorizar esto, pero será útil al leer literatura en inglés.

  ## Cómo conocer nuevas funciones

  Cada función tiene una **firma**: su "descripción", es decir, el nombre, la lista de parámetros y el tipo de valor devuelto. Es la firma la que permite entender cómo usar una función sin leer su código. Por ejemplo, la documentación de MDN describe `Math.pow()` así:

  ```
  Math.pow(base, exponent)

  Parámetros
    base      — la base de la potencia
    exponent  — el exponente de la potencia
  ```

  A partir de la firma se ve de inmediato: la función acepta dos argumentos y devuelve un número. Una vez que aprendas a leer firmas, podrás trabajar con cualquier función desconocida.

  Es imposible aprenderlo todo, y no hace falta. Lo importante es saber dónde buscar. Para JavaScript hay dos fuentes principales:

  - **MDN** ([developer.mozilla.org](https://developer.mozilla.org/es/)) - documentación sobre las capacidades incorporadas del lenguaje y las API del navegador.
  - **Documentación de Node.js** ([nodejs.org/api](https://nodejs.org/api/)) - la parte del servidor, funciones para trabajar con el sistema de archivos, la red, etc.

  Otra forma es leer el código de otras personas: cualquier paquete de npm es abierto, y en él a menudo se pueden encontrar técnicas de las que no se habla en los libros de texto.

instructions: |

  Un sitio web comprueba si los anuncios de dos empresas asociadas caben en una sola línea. Sus nombres están definidos en el código: cuenta la cantidad total de caracteres de ambos nombres con la función `length()` y muéstrala en pantalla.

  La función ya está conectada en la plantilla:

  ```javascript
  import { length } from 'hexlet-basics/string';
  ```

