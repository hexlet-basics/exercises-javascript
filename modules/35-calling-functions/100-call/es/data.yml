---
name: Funciones y su llamada
tips:
  - |
    [Llamada a una función](https://developer.mozilla.org/es/docs/Web/JavaScript/Guide/Functions#calling_functions)
definitions:
  - name: Función
    description: >-
      operación que puede recibir datos y devolver un resultado; una función se
      llama así: `foo()`.
  - name: Argumento
    description: >-
      la información que una función recibe al ser llamada. Por ejemplo,
      `foo(42)` — pasar el argumento `42` a la función `foo()`
