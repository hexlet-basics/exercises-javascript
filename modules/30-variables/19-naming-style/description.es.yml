name: Estilos de nombrado
theory: |

  `greeting` es un ejemplo de un nombre de variable simple y claro. Pero a menudo nombres como `name`, `email` o `price` no son suficientes. Por ejemplo, puede que necesites describir el nombre de un usuario, la cantidad total de pedidos o la longitud máxima de un mensaje. Tales nombres ya constan de varias palabras. ¿Cómo se verá el nombre de la variable en este caso?

  En los distintos lenguajes de programación se usan diferentes estilos de nombrado. De esto depende cómo se verá el nombre de una variable compuesta por varias palabras. Por ejemplo, así se puede escribir una variable que almacena la longitud máxima de un mensaje:

  1. `maxmessagelength`
  1. `maxMessageLength`
  1. `max-message-length`
  1. `max_message_length`

  ## Estilos principales

  Estos son algunos enfoques populares para escribir nombres compuestos:

  - **kebab-case**: las palabras se separan con un guion — `max-message-length`.

    No funciona en JavaScript, ya que el guion (`-`) se interpreta como el operador de resta.

  - **snake_case**: las palabras se separan con un guion bajo — `max_message_length`. Este es el estándar en algunos otros lenguajes, por ejemplo en Python.

  - **CamelCase** (o UpperCamelCase): cada palabra comienza con mayúscula, sin separadores — `MaxMessageLength`. En JavaScript, así se suele nombrar a las clases.

  - **lowerCamelCase**: lo mismo, pero la primera palabra comienza con minúscula — `maxMessageLength`.

  ## Cómo hacerlo correctamente en JavaScript

  El estándar para las variables en JavaScript es **lowerCamelCase**: la primera palabra en minúsculas y cada palabra siguiente con mayúscula inicial.

  ```javascript
  const userName = 'Daenerys';
  const maxLength = 280;
  const totalOrdersCount = 17;
  ```

  ## Cómo no hacerlo

  No conviene incluir el tipo de dato en el nombre de una variable. Tales nombres se leen peor y quedan obsoletos rápidamente. Por ejemplo, `userNameString` o `messagesNumber` describen no el significado de la variable, sino su implementación técnica.

  El nombre debe responder a la pregunta "¿qué se almacena?", y no "¿de qué tipo es?". Por eso es mejor escribir `userName` en lugar de `userNameString`, y `messagesCount` en lugar de `messagesNumber`.

instructions: |

  Escribe un programa que calcule e imprima en pantalla el costo de una compra.

  Crea dos variables en estilo lowerCamelCase:

  - cantidad de productos: `20`
  - precio de un producto: `100`

  Imprime su producto.

