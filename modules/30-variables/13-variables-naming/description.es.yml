---

name: Elección del nombre de una variable
theory: |
  Imagina que tenemos un programa como este:

  ```javascript
  const x = 'Father!';
  console.log(x);
  ```

  Desde el punto de vista técnico, todo funciona. Ya hemos visto ejemplos similares, pero aquí se usa una variable con el nombre `x`. Los nombres malos dificultan leer y entender el código. Aquí tienes algunos ejemplos de variables poco afortunadas:

  ```javascript
  const a = 'John';
  const n = 42;
  const ddr = 'New York';
  ```

  ¿Qué son estas variables? ¿Qué almacenan? Para entenderlo, hay que leer todo el resto del código y adivinar por el contexto.

  A la computadora le da igual cómo se llame la variable. Para ella, `x`, `abc`, `message` o `elephantInTheRoom` son simplemente etiquetas para almacenar datos. A las personas les importa otra cosa. Los programadores leen el código mucho más a menudo de lo que lo escriben. Por eso los nombres de las variables son una parte importante de la comunicación a través del código.

  ## Buenos ejemplos

  ```javascript
  const userName = 'Arya Stark';
  const unpaidOrdersCount = 3;
  const maxAttempts = 5;
  ```

  Un buen nombre de variable ayuda a entender qué hace el programa sin tener que leer cada línea. Es especialmente importante dar nombres cuyo significado sea claro sin contexto, sin necesidad de leer todo el código alrededor.

  Aquí tienes algunos consejos:

  - Usa el inglés. Es el estándar internacional. Es mejor escribir `ordersCount` en lugar de `kolvoZakazov`. Si el inglés todavía te resulta difícil, usa un traductor, es normal. Con el tiempo se hará más fácil.
  - Intenta que el nombre refleje el significado de la variable. Que sea un poco más largo, pero comprensible.
  - No tengas miedo de dedicar tiempo a elegir un buen nombre. Es una inversión en la legibilidad y el mantenimiento del código.

  Entre los programadores incluso hay una broma: «Algunos de los problemas más difíciles en programación son el almacenamiento en caché y poner nombres a las variables». A veces inventar un nombre adecuado es realmente difícil. Aquí tienes un ejemplo: ¿cómo llamarías a una variable que almacena la cantidad de pedidos no pagados de clientes con deuda del trimestre anterior?

  Y ahora un pequeño ejercicio: inventa un nombre para una variable que almacenará «la cantidad de hermanos y hermanas del rey». Anótalo en una libreta o envíatelo por correo. Solo el nombre, sin explicaciones. Volveremos a esta tarea dentro de unas lecciones.
instructions: |
  Crea una variable que describa literalmente "la cantidad de mis hermanos", y asígnale el valor *2*. Imprime el contenido de la variable. Después de una comprobación exitosa, compara tu nombre con el nombre que se usa en la solución del profesor.
