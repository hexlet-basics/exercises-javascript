---

name: Объекты, свойства и методы
description: |
  Объекты — фундаментальный тип данных JavaScript, позволяющий группировать связанные данные под одним именем. В этом модуле разберём, как создавать объекты и обращаться к их свойствам. Кроме свойств у объектов существуют методы — функции, привязанные к данным объекта. Свойства и методы — такие же выражения, как переменные, константы или вызовы функции, а значит, их можно всячески комбинировать. Также рассмотрим принцип неизменяемости данных и цепочки вызовов методов. Глубже эти темы разбираются на отдельных курсах, посвященных объектно-ориентированным возможностям JavaScript. Мы же в этом модуле изучим основы.
