---
name: Operators
tips:
  - >-
    Always separate arithmetic operators from their operands with spaces — this
    is good programming style.
  - >
    [Operators in
    JavaScript](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Expressions_and_Operators)
definitions:
  - name: Arithmetic operation
    description: addition, subtraction, multiplication, and division.
  - name: Operator
    description: >-
      a special symbol that creates an operation. For example, `+` creates the
      addition operation.
  - name: Operand
    description: 'an object that participates in an operation. `3 * 6`: here 3 and 6 are operands.'
  - name: Unary operation
    description: >-
      an operation with a single operand. For example, `-3` is a unary
      operation for getting the number opposite to three.
  - name: Binary operation
    description: an operation with two operands. For example, `3 + 9`.
