---
name: Commutative operation
tips:
  - >
    [More about
    commutativity](https://en.wikipedia.org/wiki/Commutative_property)
definitions:
  - name: Commutativity
    description: >
      a property of an operation where changing the order of the operands does
      not affect the result. For example, addition is a commutative operation:
      changing the order of the addends does not change the sum.
