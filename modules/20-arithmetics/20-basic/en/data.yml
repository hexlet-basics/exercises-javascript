---

name: Arithmetic operations

tips:
  - |
    Always separate arithmetic operators from the numbers (operands) with spaces – this is good programming style. That is why in our examples it is `console.log(3 + 4)`, not `console.log(3+4)`.
  - |
    Division by zero is `Infinity`. We will figure out what that means in future lessons.
  - |
    [Arithmetic operations](https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Operators#arithmetic_operators)
  - |
    [Division with remainder](https://en.wikipedia.org/wiki/Remainder)

definitions:
  - name: Statement
    description: |
      the smallest standalone part of a programming language; a command or a set of commands. A program is usually a sequence of statements.
