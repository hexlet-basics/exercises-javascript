---

name: Operaciones aritméticas

tips:
  - |
    Siempre separa los operadores aritméticos de los propios números (operandos) con espacios: es un buen estilo de programación. Por eso en nuestros ejemplos es `console.log(3 + 4)`, y no `console.log(3+4)`.
  - |
    La división por cero es `Infinity` (infinito). Explicaremos qué significa esto en futuras lecciones.
  - |
    [Operaciones aritméticas](https://developer.mozilla.org/es/docs/Web/JavaScript/Reference/Operators#arithmetic_operators)
  - |
    [División con resto](https://es.wikipedia.org/wiki/División_euclídea)

definitions:
  - name: Instrucción
    description: |
      la unidad más pequeña e independiente de un lenguaje de programación; una orden o conjunto de órdenes. Un programa generalmente consiste en una secuencia de instrucciones.
