definitions:
  - name: Tipo de datos
    description: >-
      conjunto de datos en el código (tipo de información). El tipo determina
      qué se puede hacer con los elementos de un conjunto específico. Por
      ejemplo, los números enteros, los números racionales y las cadenas de
      texto son tipos de datos diferentes.
  - name: Tipos de datos primitivos
    description: tipos simples, integrados en el propio lenguaje de programación.
  - name: Cadena de texto (string)
    description: >
      tipo de datos que describe un conjunto de caracteres (es decir, texto);
      por ejemplo, `'texto'` o `"texto"`.
