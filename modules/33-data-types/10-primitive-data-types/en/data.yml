definitions:
  - name: Data type
    description: >-
      a set of data in code (a kind of information). A type defines what can be
      done with the elements of a particular set. For example, integers,
      rational numbers, and strings are different data types.
  - name: Primitive data types
    description: simple types built into the programming language itself.
  - name: String (string)
    description: >
      a data type that describes a set of characters (in other words — text);
      for example, `'text'` or `"text"`.
