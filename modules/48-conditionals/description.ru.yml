---

name: Условные конструкции
description: |
  Задача функции-предиката — получить ответ на вопрос, но обычно этого недостаточно и нужно выполнить определенное действие в зависимости от ответа. В этом модуле разберём условные конструкции JavaScript: if, if-else и else if — для ветвления по условию, тернарный оператор — для коротких условных выражений, switch — для выбора из множества вариантов. С их помощью программист может выбирать необходимое поведение программы в зависимости от разных условий: пропускать одни инструкции и выполнять другие. Их и разберем на практике в этом модуле.
