---

name: Estructura condicional (if)
theory: |
  Las expresiones lógicas permiten comprobar distintas condiciones, pero por sí solas solo devuelven `true` o `false`. Para que un programa pueda ejecutar diferentes acciones según el resultado, JavaScript tiene una construcción especial llamada `if`.

  ```javascript
  if (5 > 3) {
    console.log('Yes, it is true');
  }
  ```

  Aquí se imprimirá la cadena `'Yes, it is true'` porque la condición `5 > 3` es verdadera.

  ```text
  ┌────────────┐
  │ ¿condición?│
  └─────┬──────┘
    true │
        ↓
  ┌────────────┐
  │ cuerpo if  │
  └────────────┘
  ```

  ## Sintaxis

  Después de `if`, la condición se escribe entre paréntesis, y el cuerpo va entre llaves:

  ```javascript
  if (condición) {
    // el bloque se ejecuta si la condición es true
  }
  ```

  Una condición es cualquier expresión que se convierte a `true` o `false`.

  ## Bloques de código

  Todo lo que está dentro de las llaves `{}` pertenece al cuerpo del `if`. El código después del bloque se ejecuta en cualquier caso:

  ```javascript
  if (10 === 10) {
    console.log('First');
    console.log('Second');
  }

  console.log('Goodbye!');
  ```

  Aquí se imprimirán `First` y `Second` porque se cumplió la condición. Y `Goodbye!` se imprime siempre, ya que esta línea está fuera del bloque. El principio es el mismo que en la definición de funciones.

  ## Uso de if dentro de una función

  Consideremos una función que determina el tipo de una oración dada. Si termina con un signo de interrogación, la función devuelve `'question'`, de lo contrario, `'normal'`:

  ```javascript
  const getTypeOfSentence = (sentence) => {
    if (sentence.endsWith('?')) {
      return 'question';
    }
    return 'normal';
  };

  console.log(getTypeOfSentence('Hodor'));  // => normal
  console.log(getTypeOfSentence('Hodor?')); // => question
  ```

  Aquí se usan dos `return`. Si se cumple la condición dentro del `if`, se ejecuta `return 'question'` y la función termina. Si la condición no se cumple, el control pasa a la siguiente línea con `return 'normal'`.

  De esta manera, la función tiene varios puntos de salida posibles. Esta es una práctica común: dependiendo de las condiciones, una función puede terminar de diferentes maneras.

  Aunque la función `getTypeOfSentence` usa `if`, devuelve cadenas, lo que significa que no es un predicado. Como predicado, consideremos una función que comprueba si hay suficiente dinero para una compra:

  ```javascript
  const hasEnoughMoney = (balance, price) => {
    if (balance >= price) {
      return true;
    }
    return false;
  };

  console.log(hasEnoughMoney(100, 50)); // => true
  console.log(hasEnoughMoney(30, 50));  // => false
  ```

  ## if y las expresiones lógicas

  Escribimos la función `hasEnoughMoney` usando `if`. Pero en esta forma podría prescindir de él, porque el resultado de la comparación es en sí mismo una expresión lógica:

  ```javascript
  const hasEnoughMoney = (balance, price) => balance >= price;
  ```

  En los casos simples, es mejor devolver esa expresión directamente. El `if` es necesario allí donde se ejecutan acciones adicionales dentro del bloque además de devolver el resultado. Cuanto más complejos sean los programas, más a menudo surgirán tales situaciones.
instructions: |
  Escribe una función `guessNumber(guess)` que:

  - devuelva `'You win!'` si `guess === 42`
  - devuelva `'Try again!'` en caso contrario

  ```javascript
  guessNumber(42); // => 'You win!'
  guessNumber(7);  // => 'Try again!'
  ```
