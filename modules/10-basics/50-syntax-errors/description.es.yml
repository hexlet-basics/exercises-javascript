---

name: Errores de sintaxis
theory: |
  Si un programa en JavaScript está escrito en violación de las reglas, el intérprete detendrá la ejecución y mostrará un mensaje de error. Este mensaje indica:

  - el tipo de error,
  - la línea en la que ocurrió,
  - y (a menudo) el punto donde el intérprete "tropezó".

  ## ¿Qué es un error de sintaxis?

  Un error de sintaxis (SyntaxError) es una violación de las reglas de escritura de código (reglas gramaticales) en un lenguaje de programación concreto. Estos errores ocurren cuando el código se escribe con una desviación del formato esperado: una cadena sin cerrar, un paréntesis que falta, un orden incorrecto de símbolos, etc.

  A diferencia de los lenguajes naturales, donde un texto con errores se puede entender por el contexto, en la programación incluso la más mínima desviación hace que el código sea inutilizable.

  ```text
  Código con un error      Intérprete             Resultado
  ┌────────────────────┐   ┌───────────┐   ┌──────────────────────┐
  │ console.log('Hi'   │──→│JavaScript │──→│ SyntaxError:         │
  └────────────────────┘   └───────────┘   │ missing ) after args │
                                           └──────────────────────┘
  ```

  Veamos un ejemplo sencillo con un error de sintaxis:

  ```javascript
  // La versión correcta es: console.log('Hodor')
  console.log('Hodor'
  ```

  En este código el paréntesis no está cerrado, lo que hace que el programa sea incorrecto desde el punto de vista de la sintaxis. Intentemos ejecutar el programa, y el intérprete producirá un error:

  ```bash
  node index.js
  index.js:2
  console.log('Hodor'
             ^

  SyntaxError: missing ) after argument list
  ```

  El texto puede resultar poco claro al principio, pero eso es normal: cuanto más te enfrentes a este tipo de errores, más rápido aprenderás a entender qué sucedió.

  ## ¿Por qué estos errores se consideran simples?

  Los errores de sintaxis:

  - son fáciles de detectar: el código a menudo se resalta en el editor;
  - son fáciles de corregir: basta con restaurar el símbolo que falta o corregir la estructura.

  Pero hay una pega. El intérprete no siempre señala exactamente el lugar donde se cometió el error. A veces el problema está varias líneas más arriba. Por ejemplo, un paréntesis abierto pero no cerrado en una línea puede "romper" todo el código siguiente.

  ## ¿Qué hacer ante un error de sintaxis?

  - Lee el mensaje de error. Casi siempre contiene información útil.
  - Comprueba la línea indicada en el mensaje, y la línea anterior: a veces el error está "escondido" un poco antes.
  - Usa un [editor con resaltado de sintaxis](https://code.visualstudio.com/): te ayudará a notar los problemas de inmediato (por ejemplo, comillas o paréntesis sin cerrar).
instructions: |
  El programa se inicia e informa del resultado. Escribe un programa que muestre:

  ```text
  Program started successfully
  ```

  Después de que el programa funcione, rómpelo a propósito: comete uno de los errores de sintaxis:

  - quita la comilla de cierre;
  - quita el paréntesis de cierre.

  Ejecuta el código y lee el mensaje de JavaScript. Verás estos mensajes con frecuencia, así que es importante aprender a leerlos. Luego restaura la versión que funciona para que el ejercicio pase la verificación.
