name: Cómo verificamos tus soluciones
theory: |
  Nuestro sitio web verifica automáticamente tus soluciones. ¿Cómo funciona?

  En el caso más simple, la verificación ejecuta tu código y compara la salida en pantalla con el resultado esperado. Por ejemplo, si la tarea dice: "Muestra el número 10 en pantalla", entonces tu código en JavaScript podría verse así:

  ```javascript
  console.log(10);
  ```

  La verificación ejecutará este código y se asegurará de que `10` realmente aparezca en pantalla. Si la salida coincide con la esperada, la solución se acepta. De lo contrario, verás un error:

  ```text
    ● test

    expect(received).toBe(expected) // Object.is equality

    Expected value to be:
      "10"
    Received:
      "9"
  ```

  `Expected` es el resultado esperado y `Received` es el que devolvió tu código.

  En las siguientes lecciones, más complejas, escribirás funciones. Estas toman datos y devuelven un resultado. En este tipo de tareas, la verificación funciona de manera un poco diferente: llama a tu función con diferentes argumentos y sabe de antemano qué respuesta debería obtenerse en cada caso.

  Por ejemplo, si necesitas escribir una función que sume dos números, la verificación le pasará diferentes pares de números y comparará el resultado con la suma correcta. Si las respuestas coinciden en todos los casos, la solución se considera correcta.

  Este enfoque se llama pruebas y se utiliza en el desarrollo real. Las pruebas ayudan a verificar si un programa funciona correctamente y a detectar rápidamente un error después de los cambios.

  Es precisamente por eso que nuestro sitio dice "Pruebas aprobadas" cuando resuelves correctamente la tarea.

  ## ¿Es mi error o no?

  A veces, durante el proceso de resolución, parecerá que has hecho todo correctamente, pero la verificación no acepta la solución. Esto ocurre muy raramente. Las pruebas se ejecutan automáticamente después de cada cambio, por lo que una verificación rota normalmente no llega al sitio.

  En la gran mayoría de estos casos, el error está en el código de la solución. Puede ser muy sutil: en lugar de una letra en inglés ingresaste accidentalmente una rusa, en lugar de mayúsculas usaste minúsculas o te olvidaste de poner una coma. También hay situaciones más complejas. Por ejemplo, la solución funciona para un conjunto de datos de entrada, pero no funciona para otro.

  Por lo tanto, siempre lee atentamente el enunciado de la tarea y la salida de las pruebas. Allí casi seguro hay una indicación sobre el error.

  Si estás seguro de que el problema está en la tarea o has encontrado una imprecisión, escribe a nuestra [comunidad](https://t.me/hexletcommunity), en el canal _'Feedback'_.

  Además de los ejercicios del sitio, será sumamente útil experimentar con el código en la [consola del navegador](https://developer.mozilla.org/es/docs/Tools/Browser_Console). En cualquier situación en la que no entiendas algo o quieras probar diferentes opciones, no dudes en abrir la consola e ingresar el código allí.
instructions: |
  En la tienda quedan 10 manzanas en el estante. Escribe un programa que muestre este número en pantalla.

  Luego intenta mostrar otro número y observa lo que muestra el sistema de verificación. Esto te ayudará a aprender a leer los mensajes de error de las pruebas.
